<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b0e14" />
<title>buildship — self-extending agent</title>
<style>
  :root {
    --bg: #0b0e14; --panel: #11151f; --fg: #c9d1d9; --dim: #6b7689;
    --cyan: #56b6c2; --green: #7ee787; --red: #ff7b72; --magenta: #d2a8ff;
    --rule: #222a38;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--fg); }
  body {
    font: 15px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    padding: env(safe-area-inset-top) 14px calc(env(safe-area-inset-bottom) + 24px);
    -webkit-text-size-adjust: 100%;
  }
  header { padding: 18px 2px 10px; }
  h1 { margin: 0; font-size: 17px; letter-spacing: .3px; }
  h1 .b { color: var(--cyan); }
  .sub { color: var(--dim); font-size: 12.5px; margin-top: 3px; }
  .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0 16px; }
  button {
    font: inherit; color: var(--fg); background: var(--panel);
    border: 1px solid var(--rule); border-radius: 9px; padding: 9px 13px;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  button.active { border-color: var(--cyan); color: var(--cyan); }
  button:active { transform: translateY(1px); }
  label.load { color: var(--dim); align-self: center; font-size: 12.5px; }
  label.load input { display: none; }
  #trace {
    background: var(--panel); border: 1px solid var(--rule); border-radius: 12px;
    padding: 16px 14px; white-space: pre-wrap; overflow-wrap: anywhere; min-height: 40vh;
  }
  .head { color: var(--cyan); font-weight: 700; }
  .task { color: var(--dim); font-size: 12.5px; margin: 2px 0 10px; }
  .rule { color: var(--rule); }
  .beat { opacity: 0; transform: translateY(4px); transition: opacity .25s, transform .25s; }
  .beat.show { opacity: 1; transform: none; }
  .label { color: var(--cyan); }
  .dim { color: var(--dim); }
  .ok { color: var(--green); }
  .fail { color: var(--red); }
  .selfdebug { color: var(--green); font-weight: 700;
    text-shadow: 0 0 14px rgba(126,231,135,.55); }
  .reuse { color: var(--magenta); font-weight: 700;
    text-shadow: 0 0 14px rgba(210,168,255,.5); }
  .outcome { font-weight: 700; }
  .outcome.built, .outcome.reused { color: var(--green); }
  .outcome.exhausted_budget, .outcome.error { color: var(--red); }
  footer { color: var(--dim); font-size: 12px; margin-top: 16px; text-align: center; }
</style>
</head>
<body>
  <header>
    <h1><span class="b">buildship</span> ▸ an agent that writes its own tools</h1>
    <div class="sub">it hits a gap → researches → writes a tool → tests it → fixes itself → keeps it → reuses it</div>
  </header>

  <div class="tabs" id="tabs">
    <button data-trace="self_debug">▶ build (self-debug)</button>
    <button data-trace="reuse">⚡ reuse</button>
    <button data-trace="both">▶ play both</button>
    <label class="load">＋ trace.json<input type="file" id="file" accept="application/json,.json" /></label>
  </div>

  <div id="trace"></div>
  <footer>live trace · tap a beat-set above</footer>

  <script src="app.js"></script>
</body>
</html>
